events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Extract subdomain from Host header
    # e.g., "my-site.pihost.app" -> $subdomain = "my-site"
    # or "my-site.localhost" -> $subdomain = "my-site"
    map $http_host $subdomain {
        ~^(?P<subd>[^.]+)\.pihost\.app$ $subd;
        ~^(?P<subd>[^.]+)\.localhost$ $subd;
        default "";
    }

    # API and Core Dashboard Server Block
    server {
        listen 80 default_server;
        server_name _;

        # Provide a quick health check or fallback
        root /var/www/pihost;
        index index.html;

        # API Proxy
        location /api/ {
            proxy_pass http://pihost-server:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # React Dashboard
        location / {
            # If a subdomain is provided and it exists in /public_sites, serve it!
            # We use try_files to check if the directory exists.
            if ($subdomain != "") {
                set $user_site_root /public_sites/$subdomain;
            }

            # If it's a subdomain, rewrite the root internally.
            # Unfortunately, "root" inside "if" can be tricky in nginx, 
            # so we'll use a specific approach.
            
            try_files $uri $uri/ /index.html;
        }
    }

    # User Hosted Sites Server Block
    server {
        listen 80;
        server_name ~^(?P<subd>[^.]+)\.(pihost\.app|localhost)$;

        location / {
            root /public_sites/$subd;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}
